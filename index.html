<!DOCTYPE html>
<html>
<head>
<title>Watch Video</title>

<style>
body{
background:#111;
font-family:Arial;
text-align:center;
padding:40px;
color:white;
}

.box{
position:relative;
display:inline-block;
max-width:400px;
}

.box img{
width:100%;
border-radius:12px;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
background:red;
border-radius:50%;
animation:pulse 1.5s infinite;
}

.play:before{
content:'';
position:absolute;
top:50%;
left:50%;
transform:translate(-40%,-50%);
border-left:25px solid white;
border-top:15px solid transparent;
border-bottom:15px solid transparent;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 25px;
background:red;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1>Watch The Full Video 👇</h1>

<a href="https://cdn2.slicedrive.com/qscp1uys1.mp4" class="box">

<img src="https://cdn2.aceimg.com/sG1JzvAmZ.png">

<div class="play"></div>

</a>

<br>

<a href="https://t.co/Yf2CLEBhm6" class="btn">
▶ Click Here To Watch
</a>

</body>
</html>
